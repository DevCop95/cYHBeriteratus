<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrong GPT</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <button class="new-chat" id="newChat" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New chat
        </button>

        <div class="history">
          <div class="history__label">Recent</div>
          <div class="history__item active" id="currentChat">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            <span>Current session</span>
          </div>
        </div>

        <div class="sidebar__footer">
          <div class="brand-badge">
            <span class="brand-badge__logo">☠</span>
            <div>
              <div class="brand-badge__name">Wrong GPT</div>
              <div class="brand-badge__tag">RED TEAM EDITION</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <header class="topbar">
          <button class="icon-btn sidebar-toggle" id="sidebarToggle" type="button" title="Toggle sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
          </button>

          <div class="model-pill">
            <span class="model-pill__name">Wrong GPT</span>
            <select id="modelSelect" class="model-pill__select" disabled>
              <option value="">…</option>
            </select>
          </div>

          <div class="topbar__right">
            <button class="agent-chip" id="agentToggle" type="button" aria-pressed="true" title="Agent mode (tools)">
              <span class="agent-chip__dot"></span>Agent <span id="agentVal">on</span>
            </button>
            <label class="rounds" title="Max tool rounds per response">
              <span>rounds</span>
              <input id="roundsInput" type="number" min="1" max="20" value="8" />
            </label>
            <span class="status" title="Ollama status"><span class="status__dot offline" id="statusDot"></span><span id="statusText">offline</span></span>
          </div>
        </header>

        <div class="chat" id="chat">
          <!-- Empty state -->
          <section class="welcome" id="welcome">
            <div class="welcome__logo">☠</div>
            <h1 class="welcome__title">Wrong GPT</h1>
            <p class="welcome__sub">Uncensored local assistant · red-team edition</p>
            <div class="welcome__cards">
              <button class="card" type="button" data-example="Port scan scanme.nmap.org on the common ports and tell me which services are exposed">
                <span class="card__title">Port scan</span>
                <span class="card__desc">TCP recon on a single host</span>
              </button>
              <button class="card" type="button" data-example="Audit the security headers of https://example.com and tell me what is missing">
                <span class="card__title">Header audit</span>
                <span class="card__desc">check HSTS, CSP, X-Frame-Options</span>
              </button>
              <button class="card" type="button" data-example="Inspect the TLS certificate of github.com and tell me when it expires">
                <span class="card__title">TLS certificate</span>
                <span class="card__desc">issuer, SANs and expiry</span>
              </button>
              <button class="card" type="button" data-example="Look up the DNS records (A, MX, TXT, NS) for example.com">
                <span class="card__title">DNS recon</span>
                <span class="card__desc">A, MX, TXT and NS records</span>
              </button>
              <button class="card" type="button" data-example="Compute the md5, sha1 and sha256 hashes of the text 'password123'">
                <span class="card__title">Hash text</span>
                <span class="card__desc">md5 / sha1 / sha256 / sha512</span>
              </button>
              <button class="card" type="button" data-example="What is my operating system and Node version?">
                <span class="card__title">System info</span>
                <span class="card__desc">run a command on this machine</span>
              </button>
            </div>
          </section>

          <div class="messages" id="messages"></div>
        </div>

        <button class="scroll-bottom" id="scrollBottom" type="button" title="Scroll to bottom" aria-label="Scroll to bottom">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 16l-6-6h12z"/></svg>
        </button>

        <div class="composer">
          <form class="composer__box" id="chatForm">
            <textarea
              id="promptInput"
              class="composer__input"
              rows="1"
              placeholder="Message Wrong GPT…"
              autocomplete="off"
            ></textarea>
            <button id="sendBtn" class="composer__send" type="submit" title="Send" disabled>
              <svg class="icon-send" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
              <svg class="icon-stop" viewBox="0 0 24 24" width="16" height="16"><rect x="6" y="6" width="12" height="12" rx="2.5" fill="currentColor"/></svg>
            </button>
          </form>
          <div class="composer__note">Wrong GPT is uncensored and can be wrong. For authorized red-team use only.</div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
